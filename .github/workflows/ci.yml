# GitHub Pages CI/CD workflow
name: ci

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: cd client && npx nypm@latest i

      - name: Build
        run: cd client && npm run generate

      - name: Copy generated files to repository root
        run: |
          pwd
          ls -la client/dist/ | head -20
          cp -r client/dist/. .
          git status

      - name: Commit and push generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update generated static files [skip ci]"
          git push